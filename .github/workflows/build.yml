name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PICO_SDK_VERSION: "2.2.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.2.Rel1'

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} \
            https://github.com/raspberrypi/pico-sdk.git /tmp/pico-sdk
          cd /tmp/pico-sdk && git submodule update --init

      - name: Configure CMake
        run: |
          cmake -B Firmware/RPiLinearServo/build \
                -S Firmware/RPiLinearServo \
                -DPICO_SDK_PATH=/tmp/pico-sdk
        env:
          PICO_SDK_PATH: /tmp/pico-sdk

      - name: Build
        run: cmake --build Firmware/RPiLinearServo/build --parallel

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPiLinearServo-uf2
          path: Firmware/RPiLinearServo/build/RPiLinearServo.uf2

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPiLinearServo-elf
          path: Firmware/RPiLinearServo/build/RPiLinearServo.elf
